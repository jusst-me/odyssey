name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: 1
  DO_NOT_TRACK: 1

jobs:
  # Single job so we install dependencies once and skip the (heavier) E2E
  # steps automatically as soon as an earlier gate fails — keeps billed
  # Actions minutes low on the private repo.
  ci:
    name: Lint · type-check · test · build · e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cross-run Turborepo cache (until remote caching lands — JUS-48).
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Test (unit + component)
        run: pnpm test

      - name: Build
        run: pnpm build

      # Cache the Playwright browser binary (free repo cache, does not count
      # against Actions artifact storage) so we skip the ~90 MB download.
      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser (+ OS deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @odyssey/albanie exec playwright install --with-deps chromium

      - name: Install Playwright OS deps (cached browser)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @odyssey/albanie exec playwright install-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @odyssey/albanie test:e2e

      # Only keep a report when something failed — saves artifact storage.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/albanie/playwright-report/
          retention-days: 5
          if-no-files-found: ignore
